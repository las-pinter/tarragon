name: Build Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -v --tb=short

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary-name: tarragon
          - os: windows-latest
            binary-name: tarragon.exe
          - os: macos-latest
            binary-name: tarragon

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: "pip"
      - name: Install dependencies
        run: pip install -e ".[build]"
      - name: Install Qt system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Build binary
        run: python scripts/package_nuitka.py
      - name: Generate checksum
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" == "macOS" ]; then
            shasum -a 256 ${{ matrix.binary-name }} > ${{ matrix.binary-name }}.sha256
          else
            sha256sum ${{ matrix.binary-name }} > ${{ matrix.binary-name }}.sha256
          fi
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.binary-name }}
            dist/${{ matrix.binary-name }}.sha256
