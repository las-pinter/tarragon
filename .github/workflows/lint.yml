name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: lint-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .[dev]

      # Lint is checked before formatting because if there are style violations,
      # we want to report them first. Formatting check is a secondary pass that
      # only matters once lint passes — keeping failures focused and actionable.
      - name: Check linting with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .
