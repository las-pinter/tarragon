name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .[dev]

      # GitHub's ubuntu-latest runner does not ship the Qt runtime's system
      # library dependencies out of the box — even QT_QPA_PLATFORM=offscreen
      # needs libEGL/libGL for QGuiApplication init, plus libxkbcommon and
      # libdbus for Qt's input/IPC subsystems.
      - name: Install Qt system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      # Ruff, ruff-format, and mypy are checked once in lint.yml rather than
      # here — running the full pre-commit suite across all 4 os/python
      # matrix legs was pure duplicated work with no additional coverage.
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -v --tb=short
