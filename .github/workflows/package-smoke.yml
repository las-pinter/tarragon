name: Package Smoke Test

on:
  pull_request:

concurrency:
  group: smoke-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  import-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install runtime dependencies
        run: pip install -e .

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Run import smoke tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "import tarragon; print('tarragon OK')"
          python -c "import tarragon.main; print('tarragon.main OK')"

  nuitka-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install runtime and build dependencies
        run: pip install -e . nuitka

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      # NOTE: this repo is src-layout — the entry point is src/tarragon/main.py,
      # not tarragon/main.py.
      - name: Attempt minimal Nuitka compilation
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m nuitka \
            --onefile \
            --enable-plugin=pyside6 \
            --output-filename=tarragon-smoke.bin \
            --remove-output \
            src/tarragon/main.py
