name: Build Release Binaries

on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary-name: tarragon-linux
          - os: windows-latest
            binary-name: tarragon-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e .
      - name: Install Nuitka and build tools
        run: pip install nuitka patchelf zstandard
      - name: Build binary
        run: python scripts/package_nuitka.py
      - name: Rename binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            mv dist/tarragon-viewer dist/${{ matrix.binary-name }}
          else
            mv dist/tarragon-viewer.exe dist/${{ matrix.binary-name }}
          fi
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.binary-name }}
