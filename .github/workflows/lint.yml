name: Lint

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: lint-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .[dev]

      # Runs ruff check, ruff format --check, mypy, and the hygiene hooks
      # (trailing-whitespace, end-of-file-fixer) from .pre-commit-config.yaml
      # in one pass — this is the single source of truth for lint/type
      # checks, run once rather than duplicated across ci.yml's os/python
      # matrix.
      - name: Pre-commit validation (all hooks)
        run: pre-commit run --all-files
